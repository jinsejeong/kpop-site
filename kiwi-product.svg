<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="p1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#641E16"/>
    </radialGradient>
    <radialGradient id="p2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6B2D0E"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <filter id="ds">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#500" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Three kiwis arranged -->
  <!-- Back kiwi whole -->
  <g transform="translate(270,180) rotate(20)" filter="url(#ds)">
    <ellipse cx="0" cy="0" rx="75" ry="90" fill="url(#p2)"/>
    <ellipse cx="0" cy="0" rx="73" ry="88" fill="none" stroke="#4a2005" stroke-width="2" stroke-dasharray="3,5" opacity="0.6"/>
    <ellipse cx="0" cy="-84" rx="8" ry="5" fill="#1a0a00"/>
    <rect x="-3" y="-95" width="6" height="14" rx="3" fill="#2D6A1F"/>
  </g>

  <!-- Front slice -->
  <g transform="translate(170,230)" filter="url(#ds)">
    <circle cx="0" cy="0" r="110" fill="#2C1503"/>
    <circle cx="0" cy="0" r="102" fill="#5D2906"/>
    <circle cx="0" cy="0" r="94" fill="url(#p1)"/>
    <!-- Seeds -->
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(0)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(30)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(60)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(90)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(120)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(150)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(180)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(210)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(240)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(270)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(300)"/>
    <ellipse cx="0" cy="-62" rx="5" ry="8" fill="#1a0a00" transform="rotate(330)"/>
    <!-- Fiber lines -->
    <g stroke="#F1948A" stroke-width="0.8" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(0)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(22.5)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(45)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(67.5)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(90)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(112.5)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(135)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(157.5)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(180)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(202.5)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(225)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(247.5)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(270)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(292.5)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(315)"/>
      <line x1="0" y1="0" x2="0" y2="-88" transform="rotate(337.5)"/>
    </g>
    <!-- Center -->
    <circle cx="0" cy="0" r="22" fill="#FFF5EC"/>
    <circle cx="0" cy="0" r="12" fill="white" opacity="0.9"/>
    <!-- Highlight -->
    <ellipse cx="-22" cy="-22" rx="18" ry="12" fill="white" opacity="0.15" transform="rotate(-30,-22,-22)"/>
  </g>

  <!-- Leaf decoration -->
  <g transform="translate(240, 95)">
    <path d="M0,0 C15,-30 48,-35 50,-12 C52,11 28,20 0,0Z" fill="#2D6A1F"/>
    <line x1="0" y1="0" x2="42" y2="-10" stroke="#1a4012" stroke-width="1.2"/>
  </g>
</svg>
