<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B1A1A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a0a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kiwiOuter" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6B2D0E"/>
      <stop offset="60%" stop-color="#3D1A08"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <radialGradient id="kiwiFlesh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEEDD"/>
      <stop offset="30%" stop-color="#FFD4C2"/>
      <stop offset="70%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#922B21"/>
    </radialGradient>
    <radialGradient id="kiwiCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#F5CBA7"/>
    </radialGradient>
    <radialGradient id="kiwiSlice" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDEBD0"/>
      <stop offset="20%" stop-color="#FDEBD0"/>
      <stop offset="40%" stop-color="#F1948A"/>
      <stop offset="65%" stop-color="#C0392B"/>
      <stop offset="85%" stop-color="#922B21"/>
      <stop offset="100%" stop-color="#641E16"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#8B1A1A" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="300" cy="400" rx="280" ry="100" fill="url(#bgGlow)"/>

  <!-- Whole kiwi (back) -->
  <g transform="translate(360, 200) rotate(15)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="110" ry="130" fill="url(#kiwiOuter)"/>
    <!-- Fuzzy texture lines -->
    <ellipse cx="0" cy="0" rx="108" ry="128" fill="none" stroke="#5D2906" stroke-width="2" stroke-dasharray="4,6" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="100" ry="120" fill="none" stroke="#4a2005" stroke-width="1.5" stroke-dasharray="3,8" opacity="0.4"/>
    <!-- Stem end -->
    <ellipse cx="0" cy="-125" rx="12" ry="8" fill="#2C1503"/>
    <rect x="-4" y="-140" width="8" height="18" rx="4" fill="#3D5A1A"/>
  </g>

  <!-- Sliced kiwi (front) - main hero -->
  <g transform="translate(240, 310)" filter="url(#shadow)">
    <!-- Outer skin ring -->
    <circle cx="0" cy="0" r="160" fill="#3D1A08"/>
    <!-- Brown ring -->
    <circle cx="0" cy="0" r="150" fill="#5D2906"/>
    <!-- Flesh gradient -->
    <circle cx="0" cy="0" r="138" fill="url(#kiwiSlice)"/>

    <!-- Seed pattern - radiating lines -->
    <g opacity="0.85">
      <!-- Seeds -->
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(0)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(30)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(60)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(90)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(120)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(150)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(180)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(210)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(240)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(270)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(300)"/>
      <ellipse cx="0" cy="-90" rx="7" ry="11" fill="#1a0a00" transform="rotate(330)"/>
    </g>

    <!-- Fiber lines radiating from center -->
    <g stroke="#E8A090" stroke-width="1" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(0)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(15)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(30)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(45)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(60)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(75)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(90)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(105)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(120)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(135)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(150)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(165)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(180)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(195)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(210)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(225)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(240)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(255)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(270)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(285)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(300)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(315)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(330)"/>
      <line x1="0" y1="0" x2="0" y2="-130" transform="rotate(345)"/>
    </g>

    <!-- Center white core -->
    <circle cx="0" cy="0" r="30" fill="url(#kiwiCenter)"/>
    <circle cx="0" cy="0" r="18" fill="#FFF5EC"/>
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.9"/>

    <!-- Highlight -->
    <ellipse cx="-35" cy="-35" rx="25" ry="18" fill="white" opacity="0.12" transform="rotate(-30, -35, -35)"/>
  </g>

  <!-- Decorative leaves -->
  <g transform="translate(420, 100)" opacity="0.9">
    <path d="M0,0 C20,-40 60,-50 70,-20 C80,10 40,30 0,0Z" fill="#2D6A1F"/>
    <path d="M0,0 C10,-20 35,-25 35,-10 C35,5 20,15 0,0Z" fill="#3D8B2A"/>
    <line x1="0" y1="0" x2="60" y2="-15" stroke="#1a4012" stroke-width="1.5"/>
  </g>
  <g transform="translate(380, 80) rotate(-20)" opacity="0.8">
    <path d="M0,0 C15,-35 50,-42 58,-16 C66,10 33,25 0,0Z" fill="#1F5216"/>
    <line x1="0" y1="0" x2="50" y2="-12" stroke="#14380F" stroke-width="1.5"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="100" cy="150" r="3" fill="#C0392B" opacity="0.6"/>
  <circle cx="480" cy="350" r="4" fill="#E74C3C" opacity="0.4"/>
  <circle cx="150" cy="480" r="2" fill="#C0392B" opacity="0.5"/>
  <circle cx="500" cy="180" r="2.5" fill="#E74C3C" opacity="0.5"/>
</svg>
